<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - ChronoCode</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #050508;
      color: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .bg-orb {
      position: fixed; width: 400px; height: 400px; border-radius: 50%;
      filter: blur(120px); pointer-events: none; opacity: 0.3;
    }
    .orb1 { background: rgba(99,102,241,0.15); top: -10%; left: 20%; animation: f 15s ease-in-out infinite; }
    .orb2 { background: rgba(34,197,94,0.1); bottom: -10%; right: 10%; animation: f 15s ease-in-out infinite -5s; }
    @keyframes f { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,-40px)} }
    .container { text-align: center; z-index: 1; animation: up 0.5s ease; }
    @keyframes up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
    .code { font-size: clamp(60px, 20vw, 120px); font-weight: 800; letter-spacing: -4px; background: linear-gradient(135deg, #6366f1, #22c55e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
    .msg { font-size: 18px; color: #6b7280; margin: 16px 0 32px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; background: linear-gradient(135deg, #6366f1, #4f46e5); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(99,102,241,0.3); }
  </style>
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="container">
    <div class="code">404</div>
    <div class="msg">This page doesn't exist or has been moved.</div>
    <a href="/" class="btn">Back to Home</a>
  </div>
</body>
</html>
