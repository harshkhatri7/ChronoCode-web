<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0;url=https://chronocode-app.vercel.app/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChronoCode — Redirecting...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #06080a;
      color: #f0f1f3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
    }
    @keyframes gridMove { to { background-position: 60px 60px; } }
    .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.3; }
    .orb-1 { width: min(400px, 70vw); height: min(400px, 70vw); background: #3b82f6; top: -10%; left: -5%; animation: orbFloat 8s ease-in-out infinite alternate; }
    .orb-2 { width: min(350px, 60vw); height: min(350px, 60vw); background: #6366f1; bottom: -10%; right: -5%; animation: orbFloat 8s ease-in-out infinite alternate-reverse; }
    @keyframes orbFloat {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, -30px) scale(1.1); }
    }
    .card {
      position: relative; z-index: 10;
      text-align: center;
      padding: 48px 40px;
      background: rgba(12, 14, 18, 0.75);
      backdrop-filter: blur(40px) saturate(1.5);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px;
      box-shadow: 0 0 80px rgba(59,130,246,0.06), 0 24px 48px rgba(0,0,0,0.5);
      animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0; transform: translateY(20px);
      max-width: 420px; width: 90%;
    }
    @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }
    .card::before {
      content: ''; position: absolute; inset: 0; border-radius: 24px;
      background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(99,102,241,0.04), transparent 60%);
      pointer-events: none;
    }
    svg { width: 64px; height: 64px; margin-bottom: 20px; filter: drop-shadow(0 0 20px rgba(59,130,246,0.3)); animation: pulse 3s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(59,130,246,0.3)); }
      50% { transform: scale(1.05); filter: drop-shadow(0 0 30px rgba(59,130,246,0.5)); }
    }
    h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; background: linear-gradient(135deg, #fff 30%, #8b8fa0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: #3b82f6; margin-bottom: 20px; }
    p { font-size: 14px; color: #6b7080; margin-bottom: 24px; line-height: 1.6; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.15); border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: #3b82f6; text-decoration: none; font-weight: 600; transition: color 0.2s; }
    a:hover { color: #60a5fa; text-decoration: underline; }
    .version { font-size: 10px; color: #5c5f6e; letter-spacing: 1px; text-transform: uppercase; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="card">
    <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="256" cy="256" r="200" fill="#0a0c10" stroke="#3b82f6" stroke-width="8" opacity="0.9"/>
      <circle cx="256" cy="256" r="180" stroke="rgba(59,130,246,0.15)" stroke-width="1" fill="none"/>
      <line x1="256" y1="256" x2="256" y2="110" stroke="#ffffff" stroke-width="14" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="60s" repeatCount="indefinite"/>
      </line>
      <line x1="256" y1="256" x2="370" y2="190" stroke="#3b82f6" stroke-width="8" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="3600s" repeatCount="indefinite"/>
      </line>
      <circle cx="256" cy="256" r="10" fill="#3b82f6">
        <animate attributeName="r" values="10;12;10" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="256" cy="256" r="6" fill="#ffffff"/>
    </svg>
    <h1>ChronoCode</h1>
    <div class="subtitle">Time Travel Engine</div>
    <div class="spinner"></div>
    <p>Redirecting to <strong>chronocode-app.vercel.app</strong></p>
    <p>If nothing happens, <a href="https://chronocode-app.vercel.app/">click here</a>.</p>
    <div class="version">ChronoCode v1.0.0</div>
  </div>
</body>
</html>
