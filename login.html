<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - ChronoCode</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #08090a;
      --bg-card: rgba(18, 19, 22, 0.7);
      --accent-blue: #3b82f6;
      --text-main: #f4f4f7;
      --text-muted: #8e909a;
      --border-color: rgba(255, 255, 255, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
    body {
      background-color: var(--bg-dark);
      background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, var(--bg-dark) 70%);
      color: var(--text-main);
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; overflow: hidden;
    }
    .login-container { width: 100%; max-width: 440px; padding: 24px; z-index: 10; }
    .login-card {
      background: var(--bg-card); backdrop-filter: blur(16px);
      border: 1px solid var(--border-color); border-radius: 20px;
      padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      text-align: center; position: relative;
    }
    .login-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, #3b82f6, #6366f1);
      border-radius: 20px 20px 0 0;
    }
    .logo-container { margin-bottom: 30px; }
    .logo-text {
      font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 40%, var(--text-muted));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-sub {
      color: var(--accent-blue); font-size: 11px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase; margin-top: 4px;
    }
    .welcome-text { margin-bottom: 30px; }
    .welcome-text h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
    .welcome-text p { color: var(--text-muted); font-size: 14px; line-height: 1.5; }
    .divider {
      display: flex; align-items: center; text-align: center;
      color: var(--text-muted); font-size: 12px; margin: 24px 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; border-bottom: 1px solid var(--border-color);
    }
    .divider:not(:empty)::before { margin-right: 16px; }
    .divider:not(:empty)::after { margin-left: 16px; }
    .form-group { text-align: left; margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 13px; color: var(--text-muted);
      margin-bottom: 6px; font-weight: 600;
    }
    .form-control {
      width: 100%; padding: 12px 16px;
      background: rgba(0,0,0,0.2); border: 1px solid var(--border-color);
      border-radius: 10px; color: var(--text-main); font-size: 14px;
      transition: border-color 0.2s ease;
    }
    .form-control:focus { outline: none; border-color: var(--accent-blue); }
    .submit-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: all 0.2s ease;
    }
    .submit-btn:hover {
      filter: brightness(1.1);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg { color: #ef4444; font-size: 13px; margin-top: 10px; display: none; }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.6s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer-text { margin-top: 30px; font-size: 12px; color: var(--text-muted); }
    .footer-text a { color: var(--accent-blue); text-decoration: none; }
    .footer-text a:hover { text-decoration: underline; }
    .google-btn-wrapper {
      width: 100%; margin-bottom: 16px;
      display: flex; justify-content: center;
    }
    .google-btn-wrapper iframe { border: none; }
  </style>
</head>
<body>
  <!-- Google Client ID — replace with your own from Google Cloud Console -->
  <!-- Create at: https://console.cloud.google.com/apis/credentials -->
  <!-- Authorized origins: https://chronocode-app.vercel.app, http://localhost:9998 -->
  <meta name="google-signin-client_id" content="GOOGLE_CLIENT_ID_PLACEHOLDER">
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <div class="login-container">
    <div class="login-card">
      <div class="logo-container">
        <div class="logo-text">ChronoCode</div>
        <div class="logo-sub">Time Travel Engine</div>
      </div>

      <div class="welcome-text">
        <h1 id="welcomeTitle">Welcome Back</h1>
        <p id="welcomeDesc">Sign in to synchronize your coding telemetry, access bookmarks, and compare version states.</p>
      </div>

      <!-- Web Auth (Google + Sandbox) -->
      <div id="webAuthContainer">
        <div class="google-btn-wrapper" id="googleBtnWrapper">
          <div id="g_id_onload"
               data-callback="handleGoogleCredential"
               data-auto_prompt="false">
          </div>
          <div class="g_id_signin"
               data-type="standard"
               data-shape="rectangular"
               data-theme="outline"
               data-text="sign_in_with"
               data-size="large"
               data-logo_alignment="left"
               data-width="380">
          </div>
        </div>

        <div class="divider">Or use Sandbox</div>

        <form id="sandboxForm">
          <div class="form-group">
            <label for="mockEmail">Sandbox Testing Email</label>
            <input type="email" id="mockEmail" class="form-control" placeholder="user@example.com" required value="developer@chronocode.com">
          </div>
          <button type="submit" class="submit-btn">Enter Sandbox Mode</button>
        </form>
      </div>

      <!-- Electron Auth — direct form -->
      <div id="electronAuthContainer" style="display: none;">
        <form id="electronLoginForm">
          <div class="form-group">
            <label for="electronEmail">Email</label>
            <input type="email" id="electronEmail" class="form-control" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="electronName">Display Name</label>
            <input type="text" id="electronName" class="form-control" placeholder="Your Name" required>
          </div>
          <button type="submit" class="submit-btn" id="electronLoginBtn">Sign In</button>
        </form>
        <div class="error-msg" id="electronError"></div>
        <div class="divider" style="margin-top:20px">Or</div>
        <button id="electronBrowserLoginBtn" style="width:100%; padding:12px; background:rgba(255,255,255,0.03); color:var(--text-main); border:1px solid var(--border-color); border-radius:12px; font-size:13px; font-weight:600; cursor:pointer;">
          Sign In via Web Browser
        </button>
      </div>

      <div class="footer-text">
        Want to manage the platform? <a href="/admin.html">Admin Portal</a>
      </div>
    </div>
  </div>

  <script>
    const isElectron = navigator.userAgent.toLowerCase().includes('electron') || !!(window.process && window.process.type);

    // Redirect if already logged in
    const existingToken = localStorage.getItem('cc_token');
    if (existingToken) {
      window.location.href = isElectron ? '/public/index.html' : 'index.html';
    }

    if (isElectron) {
      // ── Electron Flow ──
      document.getElementById('webAuthContainer').style.display = 'none';
      document.getElementById('electronAuthContainer').style.display = 'block';
      document.getElementById('welcomeTitle').innerText = 'Sign In to ChronoCode';
      document.getElementById('welcomeDesc').innerText = 'Enter your details to start auto-versioning your code.';

      document.getElementById('electronLoginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('electronEmail').value.trim();
        const name = document.getElementById('electronName').value.trim();
        const btn = document.getElementById('electronLoginBtn');
        const errEl = document.getElementById('electronError');
        errEl.style.display = 'none';
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Signing in...';

        try {
          const osName = navigator.userAgent.includes('Windows') ? 'Windows' : (navigator.userAgent.includes('Mac') ? 'macOS' : 'Linux');
          const res = await fetch('/api/auth/google/mock', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, name, platformInfo: osName })
          });
          const data = await res.json();
          if (res.ok && data.success) {
            localStorage.setItem('cc_token', data.token);
            localStorage.setItem('cc_user', JSON.stringify(data.user));
            if (window.electronAPI && window.electronAPI.saveSession) {
              window.electronAPI.saveSession(data.token, data.user);
            } else {
              window.location.href = '/public/index.html';
            }
          } else {
            errEl.textContent = data.message || data.error || 'Login failed';
            errEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Sign In';
          }
        } catch (err) {
          errEl.textContent = 'Network error: ' + err.message;
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      });

      document.getElementById('electronBrowserLoginBtn').addEventListener('click', () => {
        window.open('https://chronocode-app.vercel.app/login.html');
      });

      async function pollLocalSession() {
        try {
          const res = await fetch('/api/auth/local-status');
          if (res.ok) {
            const data = await res.json();
            if (data && data.token) {
              localStorage.setItem('cc_token', data.token);
              if (data.user) localStorage.setItem('cc_user', JSON.stringify(data.user));
              if (window.electronAPI && window.electronAPI.saveSession) {
                window.electronAPI.saveSession(data.token, data.user);
              } else {
                window.location.href = '/public/index.html';
              }
              return;
            }
          }
        } catch (_) {}
        setTimeout(pollLocalSession, 2000);
      }
      pollLocalSession();

    } else {
      // ── Web Flow ──
      // Google Identity Services callback
      window.handleGoogleCredential = async function(response) {
        try {
          const res = await fetch('/api/auth/google/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              credential: response.credential,
              platformInfo: 'Web'
            })
          });
          const data = await res.json();
          if (res.ok && data.success) {
            localStorage.setItem('cc_token', data.token);
            localStorage.setItem('cc_user', JSON.stringify(data.user));
            window.location.href = 'index.html';
          } else {
            alert('Sign-in failed: ' + (data.message || data.error || 'Unknown error'));
          }
        } catch (err) {
          alert('Network error: ' + err.message);
        }
      };
    }

    // Sandbox fallback form
    document.getElementById('sandboxForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('mockEmail').value;
      const osName = navigator.userAgent.includes('Windows') ? 'Windows' : (navigator.userAgent.includes('Mac') ? 'macOS' : 'Linux');
      try {
        const response = await fetch('/api/auth/google/mock', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, name: email.split('@')[0], platformInfo: osName })
        });
        const data = await response.json();
        if (response.ok && data.success) {
          localStorage.setItem('cc_token', data.token);
          localStorage.setItem('cc_user', JSON.stringify(data.user));
          try {
            await fetch('/api/auth/local-sync', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ token: data.token, user: data.user })
            });
          } catch (_) {}
          window.location.href = isElectron ? '/public/index.html' : 'index.html';
        } else {
          alert('Auth Error: ' + (data.message || 'Verification failed'));
        }
      } catch (err) {
        alert('Network Error: ' + err.message);
      }
    });
  </script>
</body>
</html>
