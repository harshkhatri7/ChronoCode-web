<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - ChronoCode</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg: #06080a;
      --card: rgba(12, 14, 18, 0.75);
      --border: rgba(255,255,255,0.06);
      --accent: #3b82f6;
      --accent2: #6366f1;
      --text: #f0f1f3;
      --muted: #6b7080;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* â”€â”€ Animated Background â”€â”€ */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
    }
    @keyframes gridMove { to { background-position: 60px 60px; } }

    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.4;
      animation: orbFloat 8s ease-in-out infinite alternate;
    }
    .orb-1 { width: min(400px, 70vw); height: min(400px, 70vw); background: #3b82f6; top: -10%; left: -5%; animation-delay: 0s; }
    .orb-2 { width: min(350px, 60vw); height: min(350px, 60vw); background: #6366f1; bottom: -10%; right: -5%; animation-delay: -3s; }
    .orb-3 { width: min(200px, 40vw); height: min(200px, 40vw); background: #8b5cf6; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -5s; opacity: 0.2; }
    @keyframes orbFloat {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, -30px) scale(1.1); }
    }

    .scanline {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.008) 2px, rgba(255,255,255,0.008) 4px);
    }

    /* â”€â”€ Card â”€â”€ */
    .login-wrap {
      position: relative; z-index: 10;
      width: 100%; max-width: 420px; padding: 20px;
    }
    .login-card {
      background: var(--card);
      backdrop-filter: blur(40px) saturate(1.5);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 36px 36px;
      box-shadow: 0 0 80px rgba(59,130,246,0.06), 0 24px 48px rgba(0,0,0,0.5);
      position: relative;
      animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0; transform: translateY(20px);
    }
    @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }

    .login-card::before {
      content: ''; position: absolute; inset: 0; border-radius: 24px;
      background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(99,102,241,0.04), transparent 60%);
      pointer-events: none;
    }

    /* â”€â”€ Logo â”€â”€ */
    .logo { text-align: center; margin-bottom: 28px; }
    .logo svg {
      width: 56px; height: 56px; margin-bottom: 16px;
      animation: logoPulse 3s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(59,130,246,0.3));
    }
    @keyframes logoPulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(59,130,246,0.3)); }
      50% { transform: scale(1.05); filter: drop-shadow(0 0 30px rgba(59,130,246,0.5)); }
    }
    .logo h1 {
      font-size: 24px; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 30%, #8b8fa0);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo p {
      font-size: 11px; font-weight: 600; letter-spacing: 3px;
      text-transform: uppercase; color: var(--accent); margin-top: 4px;
    }

    /* â”€â”€ Header â”€â”€ */
    .header { text-align: center; margin-bottom: 24px; }
    .header h2 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
    .header p { font-size: 13px; color: var(--muted); line-height: 1.5; }

    /* â”€â”€ Google Button Container â”€â”€ */
    .google-section {
      margin-bottom: 0;
    }
    .google-section .google-note {
      text-align: center; font-size: 11px; color: var(--muted); margin-bottom: 12px;
    }
    #googleSignInBtn {
      width: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    /* Override GIS rendered button styles */
    #googleSignInBtn > div {
      width: 100% !important;
      margin: 0 !important;
    }
    #googleSignInBtn > div > div {
      width: 100% !important;
      height: 52px !important;
      border-radius: 12px !important;
      border: 1px solid var(--border) !important;
      background: rgba(255,255,255,0.04) !important;
      box-shadow: none !important;
      transition: all 0.25s ease !important;
    }
    #googleSignInBtn > div > div:hover {
      border-color: rgba(255,255,255,0.12) !important;
      background: rgba(255,255,255,0.07) !important;
      transform: translateY(-1px) !important;
    }
    #googleSignInBtn iframe {
      width: 100% !important;
      height: 52px !important;
      border-radius: 12px !important;
    }

    /* â”€â”€ Consent â”€â”€ */
    .consent-wrap {
      background: rgba(0,0,0,0.2); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px; margin-top: 24px;
    }
    .consent-check {
      display: flex; align-items: flex-start; gap: 10px; cursor: pointer;
    }
    .consent-check input[type="checkbox"] {
      width: 16px; height: 16px; margin-top: 2px; accent-color: var(--accent);
      cursor: pointer; flex-shrink: 0;
    }
    .consent-check label {
      font-size: 12px; color: var(--muted); line-height: 1.5; cursor: pointer;
    }
    .consent-check label a {
      color: var(--accent); text-decoration: none; font-weight: 600;
    }
    .consent-check label a:hover { text-decoration: underline; }

    /* â”€â”€ Error â”€â”€ */
    .error-msg {
      color: #ef4444; font-size: 12px; margin-top: 12px;
      display: none; text-align: center;
      padding: 10px; background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2); border-radius: 10px;
    }

    /* â”€â”€ Footer â”€â”€ */
    .card-footer {
      text-align: center; margin-top: 24px;
      font-size: 12px; color: var(--muted);
    }
    .card-footer a { color: var(--accent); text-decoration: none; }
    .card-footer a:hover { text-decoration: underline; }

    .version-tag {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      font-size: 10px; font-weight: 600; color: var(--muted);
      letter-spacing: 1px; text-transform: uppercase; opacity: 0.4;
      z-index: 10;
    }

    /* â”€â”€ Electron Auth (email form for Electron only) â”€â”€ */
    #electronAuthContainer { display: none; }
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--muted); margin-bottom: 6px; letter-spacing: 0.3px;
    }
    .form-input {
      width: 100%; padding: 12px 14px; font-size: 14px;
      background: rgba(0,0,0,0.3); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: 'Inter', sans-serif; transition: all 0.2s ease;
    }
    .form-input:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }
    .form-input::placeholder { color: #3a3d48; }
    .btn-primary {
      width: 100%; padding: 13px; margin-top: 4px;
      background: linear-gradient(135deg, var(--accent), #2563eb);
      border: none; border-radius: 10px; color: #fff;
      font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.25s ease;
    }
    .btn-primary:hover { filter: brightness(1.1); box-shadow: 0 4px 20px rgba(59,130,246,0.3); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .divider {
      display: flex; align-items: center; gap: 16px;
      font-size: 11px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 1px; font-weight: 600; margin: 20px 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    /* â”€â”€ Window Title Bar â”€â”€ */
    .app-titlebar {
      height: 28px;
      background-color: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      -webkit-app-region: drag; /* Draggable titlebar */
      user-select: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
    }
    .titlebar-text {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }
    .window-controls {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }
    .window-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.85;
      position: relative;
      cursor: pointer;
      transition: filter 0.1s ease;
    }
    .window-dot:hover {
      filter: brightness(1.1);
    }
    .window-controls:hover .window-dot::after {
      font-size: 8px;
      font-weight: 700;
      color: rgba(0, 0, 0, 0.55);
      position: absolute;
      line-height: 1;
    }
    .window-controls:hover .window-dot.red::after {
      content: 'Ã—';
      top: 1px;
    }
    .window-controls:hover .window-dot.yellow::after {
      content: 'âˆ’';
      top: 0px;
    }
    .window-controls:hover .window-dot.green::after {
      content: '+';
      top: 1px;
      font-size: 7px;
    }
    .window-dot.red {
      background-color: #ff5f56;
      border: 0.5px solid #e0443e;
    }
    .window-dot.yellow {
      background-color: #ffbd2e;
      border: 0.5px solid #dea123;
    }
    .window-dot.green {
      background-color: #27c93f;
      border: 0.5px solid #1aab29;
    }

    /* â”€â”€ Responsive â”€â”€ */
    @media (max-width: 480px) {
      .login-wrap { padding: 12px; }
      .login-card { padding: 36px 20px 28px; border-radius: 20px; }
      .login-card h1 { font-size: 22px; }
      #googleSignInBtn > div > div { height: 48px !important; }
      #googleSignInBtn iframe { height: 48px !important; }
    }
  </style>
</head>
<body>
  <!-- Window Title Bar -->
  <div class="app-titlebar" id="appTitlebar">
    <div class="window-controls">
      <span class="window-dot red" id="winCloseBtn" title="Close"></span>
      <span class="window-dot yellow" id="winMinBtn" title="Minimize"></span>
      <span class="window-dot green" id="winMaxBtn" title="Maximize"></span>
    </div>
    <span class="titlebar-text">ChronoCode</span>
  </div>

  <!-- Background -->
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="scanline"></div>

  <div class="login-wrap">
    <div class="login-card">
      <!-- Logo -->
      <div class="logo">
        <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="256" cy="256" r="200" fill="#0a0c10" stroke="#3b82f6" stroke-width="8" opacity="0.9"/>
          <circle cx="256" cy="256" r="180" stroke="rgba(59,130,246,0.15)" stroke-width="1" fill="none"/>
          <line x1="256" y1="256" x2="256" y2="110" stroke="#ffffff" stroke-width="14" stroke-linecap="round">
            <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="60s" repeatCount="indefinite"/>
          </line>
          <line x1="256" y1="256" x2="370" y2="190" stroke="#3b82f6" stroke-width="8" stroke-linecap="round">
            <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="3600s" repeatCount="indefinite"/>
          </line>
          <circle cx="256" cy="256" r="10" fill="#3b82f6">
            <animate attributeName="r" values="10;12;10" dur="2s" repeatCount="indefinite"/>
          </circle>
          <circle cx="256" cy="256" r="6" fill="#ffffff"/>
        </svg>
        <h1>ChronoCode</h1>
        <p>Time Travel Engine</p>
      </div>

      <!-- Header -->
      <div class="header">
        <h2 id="welcomeTitle">Welcome Back</h2>
        <p id="welcomeDesc">Sign in to sync your coding telemetry.</p>
      </div>

      <!-- Web Auth (Google only) -->
      <div id="webAuthContainer">
        <div class="google-section">
          <div id="g_id_onload"
               data-client_id="1006259008468-qe2h0peam5j7k1eb4qebbksqejai3g46.apps.googleusercontent.com"
               data-callback="handleGoogleCredential"
               data-auto_prompt="false">
          </div>
          <div id="googleSignInBtn"></div>
        </div>

        <div class="error-msg" id="webError"></div>

        <!-- Consent at bottom -->
        <div class="consent-wrap">
          <div class="consent-check">
            <input type="checkbox" id="legalConsent" required>
            <label for="legalConsent">I have read and agree to the <a href="terms-and-conditions.html" target="_blank">Terms &amp; Conditions</a> and <a href="privacy-policy.html" target="_blank">Privacy Policy</a>.</label>
          </div>
        </div>
      </div>

      <!-- Electron Auth (Google via Web Sync + email fallback) -->
      <div id="electronAuthContainer">
        <div class="google-section">
          <button type="button" class="btn-primary" id="googleBrowserLoginBtn" style="background: rgba(255,255,255,0.02); color: #fff; border: 1.5px solid #f59e0b; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 0; padding: 13px; font-weight: 600; border-radius: 10px; cursor: pointer; transition: all 0.25s ease;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="vertical-align: middle;">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
            </svg>
            Sign In via Web Browser
          </button>
        </div>

        <div class="divider">or use email</div>

        <form id="electronLoginForm">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="electronEmail" class="form-input" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label>Display Name</label>
            <input type="text" id="electronName" class="form-input" placeholder="Your Name" required>
          </div>
          <button type="submit" class="btn-primary" id="electronLoginBtn">Sign In</button>
        </form>

        <div class="error-msg" id="electronError"></div>

        <!-- Consent at bottom -->
        <div class="consent-wrap">
          <div class="consent-check">
            <input type="checkbox" id="electronConsent" required>
            <label for="electronConsent">I have read and agree to the <a href="terms-and-conditions.html" target="_blank">Terms &amp; Conditions</a> and <a href="privacy-policy.html" target="_blank">Privacy Policy</a>.</label>
          </div>
        </div>
      </div>

      <div class="card-footer">
        <a href="/admin.html">Admin Portal</a>
      </div>
    </div>
  </div>

  <div class="version-tag">ChronoCode v1.0.0</div>

  <script>
    const isElectron = navigator.userAgent.toLowerCase().includes('electron') || !!(window.process && window.process.type);

    // Toggle containers immediately based on environment
    if (isElectron) {
      document.getElementById('electronAuthContainer').style.display = 'block';
      document.getElementById('webAuthContainer').style.display = 'none';
    } else {
      document.getElementById('electronAuthContainer').style.display = 'none';
      document.getElementById('webAuthContainer').style.display = 'block';
    }

    // Redirect Electron users who already have a session
    if (isElectron && localStorage.getItem('cc_token')) {
      window.location.href = '/public/index.html';
    }

    // â”€â”€ Google Identity Services â”€â”€
    let googleClientId = '1006259008468-qe2h0peam5j7k1eb4qebbksqejai3g46.apps.googleusercontent.com';

    async function loadConfig() {
      try {
        const res = await fetch('/api/auth/config');
        if (res.ok) {
          const data = await res.json();
          if (data.googleClientId) {
            googleClientId = data.googleClientId;
            const gIdOnload = document.getElementById('g_id_onload');
            if (gIdOnload) {
              gIdOnload.setAttribute('data-client_id', googleClientId);
            }
          }
        }
      } catch (err) {
        console.warn('Failed to load Google Client ID config dynamically, using fallback.', err);
      }
      initGoogleSignIn();
    }

    function initGoogleSignIn() {
      if (typeof google !== 'undefined' && google.accounts) {
        google.accounts.id.initialize({
          client_id: googleClientId,
          callback: handleGoogleCredential,
          auto_select: false
        });

        // Web: render in main container
        google.accounts.id.renderButton(
          document.getElementById('googleSignInBtn'),
          { theme: 'outline', size: 'large', width: '100%', text: 'signin_with' }
        );
      } else {
        setTimeout(initGoogleSignIn, 200);
      }
    }

    async function handleGoogleCredential(response) {
      const consentId = isElectron ? 'electronConsent' : 'legalConsent';
      if (!document.getElementById(consentId).checked) {
        const errEl = isElectron ? document.getElementById('electronError') : document.getElementById('webError');
        errEl.textContent = 'Please accept the Terms & Conditions and Privacy Policy to continue.';
        errEl.style.display = 'block';
        return;
      }
      try {
        const platformInfo = navigator.userAgent.includes('Windows') ? 'Windows' : navigator.userAgent.includes('Mac') ? 'macOS' : 'Linux';
        const res = await fetch('/api/auth/google/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ credential: response.credential, platformInfo })
        });
        const data = await res.json();
        if (res.ok && data.success) {
          localStorage.setItem('cc_token', data.token);
          localStorage.setItem('cc_user', JSON.stringify(data.user));
          if (isElectron && window.electronAPI && window.electronAPI.saveSession) {
            window.electronAPI.saveSession(data.token, data.user);
          } else {
            document.querySelector('.login-card').style.animation = 'cardOut 0.4s ease forwards';
            setTimeout(() => { window.location.href = 'index.html'; }, 350);
          }
        } else {
          const errEl = isElectron ? document.getElementById('electronError') : document.getElementById('webError');
          errEl.textContent = 'Sign-in failed: ' + (data.message || data.error || 'Unknown error');
          errEl.style.display = 'block';
        }
      } catch (err) {
        const errEl = isElectron ? document.getElementById('electronError') : document.getElementById('webError');
        errEl.textContent = 'Network error: ' + err.message;
        errEl.style.display = 'block';
      }
    }

    // â”€â”€ Electron email fallback â”€â”€
    if (isElectron) {
      document.getElementById('electronLoginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!document.getElementById('electronConsent').checked) {
          document.getElementById('electronError').textContent = 'Please accept the Terms & Conditions to continue.';
          document.getElementById('electronError').style.display = 'block';
          return;
        }
        const email = document.getElementById('electronEmail').value.trim();
        const name = document.getElementById('electronName').value.trim();
        const btn = document.getElementById('electronLoginBtn');
        const errEl = document.getElementById('electronError');
        errEl.style.display = 'none';
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner" style="display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-right:8px;"></span>Signing in...';
        try {
          const osName = navigator.userAgent.includes('Windows') ? 'Windows' : (navigator.userAgent.includes('Mac') ? 'macOS' : 'Linux');
          const res = await fetch('/api/auth/google/mock', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, name, platformInfo: osName })
          });
          const data = await res.json();
          if (res.ok && data.success) {
            localStorage.setItem('cc_token', data.token);
            localStorage.setItem('cc_user', JSON.stringify(data.user));
            if (window.electronAPI && window.electronAPI.saveSession) {
              window.electronAPI.saveSession(data.token, data.user);
            } else {
              window.location.href = '/public/index.html';
            }
          } else {
            errEl.textContent = data.message || data.error || 'Login failed';
            errEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Sign In';
          }
        } catch (err) {
          errEl.textContent = 'Network error: ' + err.message;
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      });

      // Poll local session (for sync from browser login)
      async function pollLocalSession() {
        try {
          const res = await fetch('/api/auth/local-status');
          if (res.ok) {
            const data = await res.json();
            if (data && data.token) {
              localStorage.setItem('cc_token', data.token);
              if (data.user) localStorage.setItem('cc_user', JSON.stringify(data.user));
              if (window.electronAPI && window.electronAPI.saveSession) {
                window.electronAPI.saveSession(data.token, data.user);
              }
              return;
            }
          }
        } catch (_) {}
        setTimeout(pollLocalSession, 3000);
      }
      pollLocalSession();

      // Sign In via Web Browser click handler
      const googleBtn = document.getElementById('googleBrowserLoginBtn');
      if (googleBtn) {
        googleBtn.addEventListener('click', () => {
          const url = 'https://chronocode-ai.vercel.app/login';
          if (window.electronAPI && window.electronAPI.openDownload) {
            window.electronAPI.openDownload(url);
          } else {
            window.open(url, '_blank');
          }
        });
      }
    } else {
      // Web: just init Google sign-in
      loadConfig();
    }

    // Bind Electron window controls
    const winCloseBtn = document.getElementById('winCloseBtn');
    const winMinBtn = document.getElementById('winMinBtn');
    const winMaxBtn = document.getElementById('winMaxBtn');

    if (window.electronAPI) {
      if (window.electronAPI.platform === 'darwin') {
        const winControls = document.querySelector('.window-controls');
        if (winControls) winControls.style.display = 'none';
      } else {
        if (winCloseBtn) winCloseBtn.addEventListener('click', () => window.electronAPI.close());
        if (winMinBtn) winMinBtn.addEventListener('click', () => window.electronAPI.minimize());
        if (winMaxBtn) winMaxBtn.addEventListener('click', () => window.electronAPI.maximize());
      }
    } else {
      const winControls = document.querySelector('.window-controls');
      if (winControls) winControls.style.display = 'none';
    }

    // Card exit animation
    const style = document.createElement('style');
    style.textContent = '@keyframes cardOut { to { opacity: 0; transform: translateY(-10px) scale(0.98); } } @keyframes spin { to { transform: rotate(360deg); } }';
    document.head.appendChild(style);
  </script>
</body>
</html>
